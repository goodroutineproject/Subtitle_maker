<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>비디오 메이커</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root {
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a; --border:#222;
  --accent:#7f5cf0; --accent-dim:rgba(127,92,240,0.15); --accent-glow:rgba(127,92,240,0.3);
  --text:#f0f0f0; --text-dim:#555; --text-mid:#888;
  --warn:#f0a04a; --danger:#f05c5c; --success:#4af0a0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:140px;}

.header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.08em;}
.header-right{display:flex;align-items:center;gap:10px;}
.status-dot{display:flex;align-items:center;gap:4px;cursor:pointer;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);flex-shrink:0;}
.dot.on{background:var(--success);}
.dot-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);}
.dot-label.on{color:var(--success);}
.header-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);}
.header-meta span{color:var(--accent);font-weight:600;}

.tabs-bar{display:flex;align-items:center;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;padding:0 8px;}
.tabs-bar::-webkit-scrollbar{height:2px;}
.tabs-bar::-webkit-scrollbar-thumb{background:var(--border);}
.tab-btn{display:flex;align-items:center;gap:6px;padding:10px 14px;font-size:12px;color:var(--text-mid);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;transition:all .15s;flex-shrink:0;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-close{font-size:15px;color:var(--text-dim);line-height:1;margin-left:2px;}
.tab-add{padding:8px 14px;background:transparent;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;flex-shrink:0;}
.tab-add:active{color:var(--accent);}

.tab-meta{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;}
.tab-title-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;padding:8px 12px;outline:none;}
.tab-title-input:focus{border-color:var(--accent);}
.tab-title-input::placeholder{color:var(--text-dim);}
.tab-date-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 10px;outline:none;width:130px;flex-shrink:0;color-scheme:dark;}
.tab-date-input:focus{border-color:var(--accent);}

.top-controls{padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg2);}
.ctrl-group{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;}
.ctrl-label{font-size:11px;color:var(--text-dim);white-space:nowrap;}
.ctrl-value{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--text);min-width:22px;text-align:center;}
.ctrl-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;}
.ctrl-btn:active{background:var(--accent-dim);border-color:var(--accent);}
.upload-btn{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--text-mid);cursor:pointer;transition:all .15s;white-space:nowrap;}
.upload-btn:active{border-color:var(--accent);color:var(--accent);}
#file-input{display:none;}

.default-sec-row{padding:10px 16px;display:flex;align-items:center;gap:10px;background:var(--bg2);border-bottom:1px solid var(--border);}
.default-sec-label{font-size:11px;color:var(--text-dim);}
.default-sec-input{width:56px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;padding:4px 8px;text-align:center;outline:none;}
.default-sec-input:focus{border-color:var(--accent);}
.apply-all-btn{font-size:11px;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent);border-radius:6px;padding:4px 10px;cursor:pointer;}
.apply-all-btn:active{background:var(--accent);color:#fff;}
.total-time{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-mid);}
.total-time span{color:var(--accent);font-weight:600;}

.sync-row{padding:8px 16px;display:flex;gap:8px;background:var(--bg2);border-bottom:1px solid var(--border);}
.sync-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text-mid);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;}
.sync-btn:active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}

.lines-container{padding:10px 16px;display:flex;flex-direction:column;gap:5px;}
.line-row{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:7px 10px;transition:border-color .15s;}
.line-row:focus-within{border-color:var(--accent);background:rgba(127,92,240,0.04);}
.line-row.warn-chars{border-color:var(--warn);}
.line-row.dragging{opacity:.35;}
.line-row.drag-over{border-color:var(--accent);border-style:dashed;background:var(--accent-dim);}
.drag-handle{color:var(--text-dim);font-size:15px;cursor:grab;padding:0 2px;flex-shrink:0;user-select:none;}
.drag-handle:active{cursor:grabbing;color:var(--accent);}
.line-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);min-width:16px;text-align:right;flex-shrink:0;}
.line-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:300;line-height:1.4;resize:none;min-height:22px;overflow:hidden;}
.line-input::placeholder{color:var(--text-dim);font-size:13px;}
.char-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);min-width:26px;text-align:right;flex-shrink:0;}
.char-count.over{color:var(--warn);font-weight:600;}
.sec-control{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.sec-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text-mid);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;line-height:1;}
.sec-btn:active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.sec-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-mid);min-width:22px;text-align:center;flex-shrink:0;}
.line-del{width:22px;height:22px;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--text-dim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;}
.line-del:active{background:rgba(240,92,92,.15);border-color:var(--danger);color:var(--danger);}

.spell-section{padding:0 16px 10px;}
.spell-btn{width:100%;padding:11px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text-mid);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.spell-btn:active,.spell-btn.loading{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.spell-results{margin-top:8px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:none;}
.spell-results.show{display:block;}
.spell-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);}
.spell-header-label{font-size:11px;color:var(--text-dim);}
.spell-apply-all{font-size:12px;color:#fff;background:var(--accent);border:none;border-radius:6px;padding:5px 14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:700;}
.spell-apply-all:active{opacity:.8;}
.spell-item{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.spell-item:last-child{border-bottom:none;}
.spell-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);min-width:18px;padding-top:2px;}
.spell-content{flex:1;}
.spell-original{font-size:12px;color:var(--text-dim);text-decoration:line-through;margin-bottom:3px;}
.spell-corrected{font-size:13px;color:var(--text);}
.spell-apply{font-size:11px;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent);border-radius:5px;padding:3px 8px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Noto Sans KR',sans-serif;}
.spell-apply:active{background:var(--accent);color:#fff;}
.spell-ok{padding:14px;text-align:center;font-size:12px;color:var(--success);display:flex;align-items:center;justify-content:center;gap:6px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:24px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--accent);border-radius:16px;padding:24px;width:100%;max-width:400px;box-shadow:0 0 40px var(--accent-glow);}
.modal-title{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:.08em;margin-bottom:8px;}
.modal-desc{font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:16px;}
.modal-desc a{color:var(--accent);text-decoration:none;}
.modal-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 12px;outline:none;margin-bottom:12px;}
.modal-input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;}
.modal-skip{flex:1;padding:11px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.modal-save{flex:2;padding:11px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:rgba(10,10,10,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;gap:8px;z-index:100;}
.btn-secondary{flex:1;padding:13px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text-mid);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.btn-secondary:active{border-color:var(--accent);color:var(--accent);}
.btn-primary{flex:2;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;box-shadow:0 0 20px var(--accent-glow);}
.btn-primary:active{transform:scale(.98);opacity:.9;}

.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--bg3);border:1px solid var(--accent);color:var(--text);font-size:13px;padding:10px 18px;border-radius:8px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">비디오 메이커</div>
  <div class="header-right">
    <div class="status-dot" onclick="openModal('sync-modal')">
      <div class="dot" id="sync-dot"></div>
      <span class="dot-label" id="sync-label">시트</span>
    </div>
    <div class="status-dot" onclick="openModal('api-modal')">
      <div class="dot" id="api-dot"></div>
      <span class="dot-label" id="api-label">API</span>
    </div>
    <div class="header-meta"><span id="line-count">23</span>줄·<span id="total-sec-header">69</span>초</div>
  </div>
</div>

<div class="tabs-bar" id="tabs-bar"></div>

<div class="tab-meta">
  <input type="text" class="tab-title-input" id="tab-title" placeholder="영상 제목..." oninput="saveCurrentTabMeta()">
  <input type="date" class="tab-date-input" id="tab-date" oninput="saveCurrentTabMeta()">
</div>

<div class="top-controls">
  <div class="ctrl-group">
    <span class="ctrl-label">줄</span>
    <button class="ctrl-btn" onclick="removeLastLine()">−</button>
    <span class="ctrl-value" id="line-count-ctrl">23</span>
    <button class="ctrl-btn" onclick="addLine()">＋</button>
  </div>
  <label class="upload-btn" for="file-input">📄 파일 올리기<input type="file" id="file-input" accept=".txt,.docx" onchange="handleFileUpload(event)"></label>
  <button class="upload-btn" onclick="clearAll()">🗑 초기화</button>
</div>

<div class="default-sec-row">
  <span class="default-sec-label">기본 초수</span>
  <input type="number" class="default-sec-input" id="default-sec" value="3" min="1" max="30" oninput="updateTotalTime()">
  <button class="apply-all-btn" onclick="applyDefaultToAll()">전체 적용</button>
  <div class="total-time">총 <span id="total-time-val">69</span>초</div>
</div>

<div class="sync-row">
  <button class="sync-btn" onclick="saveToSheet()">☁ 저장</button>
  <button class="sync-btn" onclick="loadFromSheet()">↓ 불러오기</button>
</div>

<div class="lines-container" id="lines-container"></div>

<div class="spell-section">
  <button class="spell-btn" id="spell-btn" onclick="checkSpelling()"><span>✦</span> 맞춤법 검토</button>
  <div class="spell-results" id="spell-results"></div>
</div>

<div class="bottom-bar">
  <button class="btn-secondary" onclick="previewSRT()">미리보기</button>
  <button class="btn-primary" onclick="downloadSRT()">SRT 다운로드</button>
</div>

<div class="modal-overlay" id="sync-modal">
  <div class="modal">
    <div class="modal-title">☁ 구글 시트 연동</div>
    <div class="modal-desc">Apps Script 웹앱 URL을 입력하면 폰 ↔ PC 자동 연동돼요.</div>
    <input type="text" class="modal-input" id="sheet-url-input" placeholder="https://script.google.com/macros/s/...">
    <div class="modal-btns">
      <button class="modal-skip" onclick="closeModal('sync-modal')">나중에</button>
      <button class="modal-save" onclick="saveSheetUrl()">저장하기</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="api-modal">
  <div class="modal">
    <div class="modal-title">✦ ANTHROPIC API 키</div>
    <div class="modal-desc">맞춤법 교정 기능에 필요해요. 키는 브라우저에만 저장돼요.<br><br>키 발급 → <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></div>
    <input type="password" class="modal-input" id="api-key-input" placeholder="sk-ant-...">
    <div class="modal-btns">
      <button class="modal-skip" onclick="closeModal('api-modal')">나중에</button>
      <button class="modal-save" onclick="saveApiKey()">저장하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let tabs = [], activeTab = 0, dragSrcIdx = null, spellCorrections = [];
let apiKey = localStorage.getItem('anthropic_api_key') || '';
let sheetUrl = localStorage.getItem('sheet_url') || '';

function init() {
  const saved = localStorage.getItem('video_maker_tabs');
  tabs = saved ? JSON.parse(saved) : [newTab('영상 1'), newTab('영상 2')];
  activeTab = 0;
  renderTabs(); renderLines(); updateTotalTime();
  updateApiStatus(); updateSyncStatus();
  if (!apiKey) setTimeout(() => openModal('api-modal'), 600);
}

function newTab(name) {
  return { name, title: '', date: '', lines: Array.from({length:23}, () => ({text:'', sec:3})) };
}

function saveTabs() { localStorage.setItem('video_maker_tabs', JSON.stringify(tabs)); }

// TABS
function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = '';
  tabs.forEach((tab, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === activeTab ? ' active' : '');
    btn.innerHTML = `<span>${tab.name}</span>${tabs.length > 1 ? `<span class="tab-close" onclick="removeTab(${i},event)">×</span>` : ''}`;
    btn.onclick = (e) => { if (!e.target.classList.contains('tab-close')) switchTab(i); };
    bar.appendChild(btn);
  });
  const add = document.createElement('button');
  add.className = 'tab-add'; add.textContent = '+'; add.onclick = addTab;
  bar.appendChild(add);
  document.getElementById('tab-title').value = tabs[activeTab].title || '';
  document.getElementById('tab-date').value = tabs[activeTab].date || '';
}

function switchTab(i) {
  activeTab = i; renderTabs(); renderLines(); updateTotalTime();
  document.getElementById('spell-results').classList.remove('show');
}

function addTab() {
  tabs.push(newTab('영상 ' + (tabs.length + 1)));
  activeTab = tabs.length - 1; saveTabs(); renderTabs(); renderLines(); updateTotalTime();
}

function removeTab(i, e) {
  e.stopPropagation();
  if (tabs.length <= 1) return;
  if (!confirm(`"${tabs[i].name}" 탭을 삭제할까요?`)) return;
  tabs.splice(i, 1);
  if (activeTab >= tabs.length) activeTab = tabs.length - 1;
  saveTabs(); renderTabs(); renderLines(); updateTotalTime();
}

function saveCurrentTabMeta() {
  tabs[activeTab].title = document.getElementById('tab-title').value;
  tabs[activeTab].date = document.getElementById('tab-date').value;
  const t = tabs[activeTab].title.trim();
  if (t) tabs[activeTab].name = t.length > 12 ? t.slice(0,12)+'…' : t;
  saveTabs(); renderTabs();
}

// LINES
function getLines() { return tabs[activeTab].lines; }

function renderLines() {
  const lines = getLines();
  const container = document.getElementById('lines-container');
  container.innerHTML = '';
  lines.forEach((line, i) => {
    const row = document.createElement('div');
    row.className = 'line-row' + (line.text.length > 20 ? ' warn-chars' : '');
    row.draggable = true; row.dataset.idx = i;
    row.innerHTML = `
      <span class="drag-handle">⠿</span>
      <span class="line-num">${i+1}</span>
      <textarea class="line-input" placeholder="자막 입력..." rows="1"
        oninput="onLineInput(${i},this)" onkeydown="onLineKeydown(event,${i})"
      >${line.text}</textarea>
      <span class="char-count${line.text.length>20?' over':''}" id="char-${i}">${line.text.length}</span>
      <div class="sec-control">
        <button class="sec-btn" onclick="changeSec(${i},-1)">−</button>
        <span class="sec-val" id="sec-${i}">${line.sec}s</span>
        <button class="sec-btn" onclick="changeSec(${i},1)">+</button>
      </div>
      <button class="line-del" onclick="deleteLine(${i})">×</button>`;
    row.addEventListener('dragstart', onDragStart);
    row.addEventListener('dragover', onDragOver);
    row.addEventListener('drop', onDrop);
    row.addEventListener('dragend', onDragEnd);
    container.appendChild(row);
    autoResize(row.querySelector('textarea'));
  });
  document.getElementById('line-count').textContent = lines.length;
  document.getElementById('line-count-ctrl').textContent = lines.length;
}

function autoResize(ta) { ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; }

function onLineInput(i, ta) {
  getLines()[i].text = ta.value; autoResize(ta);
  const ce = document.getElementById(`char-${i}`);
  ce.textContent = ta.value.length;
  const row = ta.closest('.line-row');
  if (ta.value.length > 20) { row.classList.add('warn-chars'); ce.classList.add('over'); }
  else { row.classList.remove('warn-chars'); ce.classList.remove('over'); }
  updateTotalTime(); saveTabs();
}

function onLineKeydown(e, i) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const all = document.querySelectorAll('.line-input');
    if (all[i+1]) all[i+1].focus(); else addLine();
  }
}

function changeSec(i, d) {
  getLines()[i].sec = Math.max(1, getLines()[i].sec + d);
  document.getElementById(`sec-${i}`).textContent = getLines()[i].sec + 's';
  updateTotalTime(); saveTabs();
}

function addLine() {
  const defSec = parseInt(document.getElementById('default-sec').value) || 3;
  getLines().push({text:'', sec:defSec}); saveTabs(); renderLines();
  setTimeout(() => {
    const all = document.querySelectorAll('.line-input');
    all[all.length-1]?.focus();
    all[all.length-1]?.scrollIntoView({behavior:'smooth',block:'center'});
  }, 50);
}

function removeLastLine() {
  if (getLines().length <= 1) return; getLines().pop(); saveTabs(); renderLines();
}

function deleteLine(i) {
  if (getLines().length <= 1) return; getLines().splice(i,1); saveTabs(); renderLines();
}

function clearAll() {
  if (!confirm('이 탭의 내용을 모두 지울까요?')) return;
  tabs[activeTab].lines = getLines().map(l => ({...l, text:''}));
  saveTabs(); renderLines();
  document.getElementById('spell-results').classList.remove('show');
}

function applyDefaultToAll() {
  const defSec = parseInt(document.getElementById('default-sec').value) || 3;
  tabs[activeTab].lines = getLines().map(l => ({...l, sec:defSec}));
  saveTabs(); renderLines(); showToast(`전체 ${defSec}초 적용됨`);
}

function updateTotalTime() {
  const total = getLines().reduce((s,l) => s+l.sec, 0);
  document.getElementById('total-time-val').textContent = total;
  document.getElementById('total-sec-header').textContent = total;
}

// DRAG & DROP
function onDragStart(e) {
  dragSrcIdx = parseInt(e.currentTarget.dataset.idx);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.line-row').forEach(r => r.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  const targetIdx = parseInt(e.currentTarget.dataset.idx);
  if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
  const lines = getLines();
  const [moved] = lines.splice(dragSrcIdx, 1);
  lines.splice(targetIdx, 0, moved);
  saveTabs(); renderLines();
}
function onDragEnd() {
  document.querySelectorAll('.line-row').forEach(r => { r.classList.remove('dragging'); r.classList.remove('drag-over'); });
  dragSrcIdx = null;
}

// FILE UPLOAD
function handleFileUpload(event) {
  const file = event.target.files[0]; if (!file) return;
  const defSec = parseInt(document.getElementById('default-sec').value) || 3;
  if (file.name.endsWith('.txt')) {
    const reader = new FileReader();
    reader.onload = (e) => loadTextIntoLines(e.target.result, defSec);
    reader.readAsText(file, 'UTF-8');
  } else if (file.name.endsWith('.docx')) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try { const r = await mammoth.extractRawText({arrayBuffer:e.target.result}); loadTextIntoLines(r.value, defSec); }
      catch { showToast('docx 파싱 실패'); }
    };
    reader.readAsArrayBuffer(file);
  }
  event.target.value = '';
}

function loadTextIntoLines(text, defSec) {
  const raw = text.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  tabs[activeTab].lines = raw.length ? raw.map(t=>({text:t,sec:defSec})) : [{text:'',sec:defSec}];
  saveTabs(); renderLines(); showToast(`${tabs[activeTab].lines.length}줄 불러옴`);
}

// SPELL CHECK
async function checkSpelling() {
  if (!apiKey) { openModal('api-modal'); return; }
  const btn = document.getElementById('spell-btn');
  const resultsEl = document.getElementById('spell-results');
  const lines = getLines();
  const texts = lines.map((l,i) => `${i+1}. ${l.text}`).filter((_,i) => lines[i].text.trim());
  if (!texts.length) { showToast('입력된 자막이 없어요'); return; }
  btn.classList.add('loading'); btn.innerHTML = '<span>⟳</span> 검토 중...';
  try {
    const prompt = `아래 자막 줄들의 맞춤법과 띄어쓰기를 교정해줘.\n교정이 필요한 줄만 포함하고, 맞는 줄은 제외해.\n반드시 JSON 배열로만 응답해. 다른 텍스트 없이.\n형식: [{"line": 줄번호, "original": "원본", "corrected": "교정본"}]\n자막:\n${texts.join('\n')}`;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    spellCorrections = JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    resultsEl.innerHTML = '';
    if (!spellCorrections.length) {
      resultsEl.innerHTML = '<div class="spell-ok">✓ 맞춤법 이상 없음</div>';
    } else {
      const header = document.createElement('div');
      header.className = 'spell-header';
      header.innerHTML = `<span class="spell-header-label">${spellCorrections.length}개 교정 사항</span><button class="spell-apply-all" onclick="applyAllCorrections()">전체 적용</button>`;
      resultsEl.appendChild(header);
      spellCorrections.forEach(c => {
        const item = document.createElement('div');
        item.className = 'spell-item';
        item.innerHTML = `
          <span class="spell-num">${c.line}</span>
          <div class="spell-content">
            <div class="spell-original">${c.original}</div>
            <div class="spell-corrected">${c.corrected}</div>
          </div>
          <button class="spell-apply" onclick="applyCorrection(${c.line-1},'${c.corrected.replace(/'/g,"\\'")}',this)">적용</button>`;
        resultsEl.appendChild(item);
      });
    }
    resultsEl.classList.add('show');
  } catch { showToast('교정 중 오류가 났어요'); }
  btn.classList.remove('loading'); btn.innerHTML = '<span>✦</span> 맞춤법 검토';
}

function applyCorrection(i, corrected, btn) {
  getLines()[i].text = corrected; saveTabs(); renderLines();
  if (btn) { btn.textContent='✓'; btn.style.opacity='.5'; btn.disabled=true; }
  showToast(`${i+1}번 줄 적용됨`);
}

function applyAllCorrections() {
  spellCorrections.forEach(c => { getLines()[c.line-1].text = c.corrected; });
  saveTabs(); renderLines();
  document.getElementById('spell-results').classList.remove('show');
  showToast(`${spellCorrections.length}개 전체 적용됨!`);
}

// SRT
function generateSRT() {
  let srt = '', t = 0;
  getLines().forEach((line, i) => {
    if (!line.text.trim()) return;
    srt += `${i+1}\n${formatTime(t)} --> ${formatTime(t+line.sec)}\n${line.text}\n\n`;
    t += line.sec;
  });
  return srt;
}
function formatTime(s) {
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60);
  return `${pad(h)}:${pad(m)}:${pad(sec)},000`;
}
function pad(n) { return String(n).padStart(2,'0'); }

function previewSRT() {
  const srt = generateSRT(); if (!srt.trim()) { showToast('입력된 자막이 없어요'); return; }
  const modal = document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:999;display:flex;flex-direction:column;padding:16px;';
  modal.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#7f5cf0;">SRT 미리보기</span><button onclick="this.closest('div[style]').remove()" style="background:transparent;border:1px solid #333;color:#999;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;">닫기</button></div><pre style="flex:1;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:#ccc;line-height:1.8;white-space:pre-wrap;background:#111;border:1px solid #222;border-radius:8px;padding:12px;">${srt}</pre>`;
  document.body.appendChild(modal);
}

function downloadSRT() {
  const srt = generateSRT(); if (!srt.trim()) { showToast('입력된 자막이 없어요'); return; }
  const tab = tabs[activeTab];
  const dateStr = tab.date ? tab.date.replace(/-/g,'') : new Date().toISOString().slice(0,10).replace(/-/g,'');
  const titleStr = tab.title ? tab.title.replace(/\s+/g,'_').replace(/[^\w가-힣]/g,'') : 'subtitle';
  const blob = new Blob([srt], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`${titleStr}_${dateStr}.srt`; a.click();
  URL.revokeObjectURL(url); showToast('SRT 다운로드 완료!');
}

// SYNC
async function saveToSheet() {
  if (!sheetUrl) { openModal('sync-modal'); return; }
  const btn = event.target; btn.textContent='저장 중...';
  try {
    await fetch(sheetUrl, {method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'save',tabs})});
    showToast('☁ 구글 시트에 저장됨!');
  } catch { showToast('저장 실패'); }
  btn.innerHTML='☁ 저장';
}

async function loadFromSheet() {
  if (!sheetUrl) { openModal('sync-modal'); return; }
  const btn = event.target; btn.textContent='불러오는 중...';
  try {
    const res = await fetch(sheetUrl+'?action=load');
    const data = await res.json();
    if (data.tabs && data.tabs.length) {
      tabs=data.tabs; activeTab=0; saveTabs(); renderTabs(); renderLines(); updateTotalTime();
      showToast('↓ 불러옴!');
    } else showToast('저장된 내용이 없어요');
  } catch { showToast('불러오기 실패'); }
  btn.innerHTML='↓ 불러오기';
}

// MODALS
function openModal(id) {
  if (id==='api-modal') document.getElementById('api-key-input').value=apiKey;
  if (id==='sync-modal') document.getElementById('sheet-url-input').value=sheetUrl;
  document.getElementById(id).classList.add('show');
}
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) { showToast('키를 입력해줘요'); return; }
  apiKey=val; localStorage.setItem('anthropic_api_key',apiKey);
  updateApiStatus(); closeModal('api-modal'); showToast('API 키 저장됨!');
}
function saveSheetUrl() {
  const val = document.getElementById('sheet-url-input').value.trim();
  if (!val) { showToast('URL을 입력해줘요'); return; }
  sheetUrl=val; localStorage.setItem('sheet_url',sheetUrl);
  updateSyncStatus(); closeModal('sync-modal'); showToast('시트 URL 저장됨!');
}
function updateApiStatus() {
  document.getElementById('api-dot').className='dot'+(apiKey?' on':'');
  const l=document.getElementById('api-label'); l.textContent=apiKey?'API ✓':'API'; l.className='dot-label'+(apiKey?' on':'');
}
function updateSyncStatus() {
  document.getElementById('sync-dot').className='dot'+(sheetUrl?' on':'');
  const l=document.getElementById('sync-label'); l.textContent=sheetUrl?'시트 ✓':'시트'; l.className='dot-label'+(sheetUrl?' on':'');
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000);
}

const s=document.createElement('script');
s.src='https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
document.head.appendChild(s);

init();
</script>
