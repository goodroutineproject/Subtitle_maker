<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>릴스 메이커</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --border: #222222;
    --accent: #7f5cf0;
    --accent-dim: rgba(127, 92, 240, 0.15);
    --accent-glow: rgba(127, 92, 240, 0.3);
    --text: #f0f0f0;
    --text-dim: #666;
    --text-mid: #999;
    --warn: #f0a04a;
    --danger: #f05c5c;
    --success: #4af0a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding-bottom: 120px;
  }

  /* HEADER */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  .header-meta span {
    color: var(--accent);
    font-weight: 600;
  }

  /* TOP CONTROLS */
  .top-controls {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
  }

  .ctrl-label {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .ctrl-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    min-width: 24px;
    text-align: center;
  }

  .ctrl-btn {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }

  .ctrl-btn:active { background: var(--accent-dim); border-color: var(--accent); }

  .upload-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 11px;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .upload-btn:active { border-color: var(--accent); color: var(--accent); }
  #file-input { display: none; }

  /* DEFAULT SECONDS */
  .default-sec-row {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }

  .default-sec-label {
    font-size: 11px;
    color: var(--text-dim);
  }

  .default-sec-input {
    width: 60px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 8px;
    text-align: center;
    outline: none;
  }

  .default-sec-input:focus { border-color: var(--accent); }

  .apply-all-btn {
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .apply-all-btn:active { background: var(--accent); color: #fff; }

  .total-time {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-mid);
  }

  .total-time span { color: var(--accent); font-weight: 600; }

  /* LINES */
  .lines-container {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .line-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    transition: border-color 0.15s;
    position: relative;
  }

  .line-row:focus-within {
    border-color: var(--accent);
    background: rgba(127, 92, 240, 0.04);
  }

  .line-row.warn-chars { border-color: var(--warn); }
  .line-row.warn-chars:focus-within { border-color: var(--warn); }

  .line-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    min-width: 18px;
    text-align: right;
    flex-shrink: 0;
  }

  .line-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 300;
    line-height: 1.4;
    resize: none;
    min-height: 22px;
    overflow: hidden;
  }

  .line-input::placeholder { color: var(--text-dim); font-size: 13px; }

  .char-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    min-width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  .char-count.over { color: var(--warn); font-weight: 600; }

  .sec-control {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .sec-btn {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text-mid);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    line-height: 1;
    flex-shrink: 0;
  }

  .sec-btn:active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .sec-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-mid);
    min-width: 22px;
    text-align: center;
    flex-shrink: 0;
  }

  .line-del {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    flex-shrink: 0;
  }

  .line-del:active { background: rgba(240,92,92,0.15); border-color: var(--danger); color: var(--danger); }

  /* SPELL CHECK */
  .spell-section {
    padding: 0 16px 12px;
  }

  .spell-btn {
    width: 100%;
    padding: 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-mid);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .spell-btn:active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .spell-btn.loading { color: var(--accent); border-color: var(--accent); }

  .spell-results {
    margin-top: 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: none;
  }

  .spell-results.show { display: block; }

  .spell-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .spell-item:last-child { border-bottom: none; }

  .spell-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    min-width: 20px;
    padding-top: 2px;
  }

  .spell-content { flex: 1; }

  .spell-original {
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: line-through;
    margin-bottom: 3px;
  }

  .spell-corrected {
    font-size: 13px;
    color: var(--text);
  }

  .spell-apply {
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 5px;
    padding: 3px 8px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.12s;
  }

  .spell-apply:active { background: var(--accent); color: #fff; }

  .spell-ok {
    padding: 14px;
    text-align: center;
    font-size: 12px;
    color: var(--success);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  /* BOTTOM BAR */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px;
    background: rgba(10,10,10,0.97);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    z-index: 100;
  }

  .btn-secondary {
    flex: 1;
    padding: 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-mid);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-secondary:active { border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    flex: 2;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

  /* TOAST */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--bg3);
    border: 1px solid var(--accent);
    color: var(--text);
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 8px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* API KEY MODAL */
  .api-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .api-modal {
    background: var(--bg2);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 0 40px var(--accent-glow);
  }
  .api-modal-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .api-modal-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .api-modal-desc a {
    color: var(--accent);
    text-decoration: none;
  }
  .api-key-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    margin-bottom: 12px;
  }
  .api-key-input:focus { border-color: var(--accent); }
  .api-modal-btns {
    display: flex; gap: 8px;
  }
  .api-skip-btn {
    flex: 1; padding: 11px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }
  .api-save-btn {
    flex: 2; padding: 11px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }
  .api-status {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
  }
  .api-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .api-dot.active { background: var(--success); }
  .api-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">릴스 메이커</div>
  <div style="display:flex; align-items:center; gap:12px;">
    <div class="api-status" onclick="openApiModal()" title="API 키 설정">
      <div class="api-dot" id="api-dot"></div>
      <span class="api-label" id="api-label">API 키</span>
    </div>
    <div class="header-meta"><span id="line-count">23</span>줄 · <span id="total-sec-header">69</span>초</div>
  </div>
</div>

<div class="top-controls">
  <div class="ctrl-group">
    <span class="ctrl-label">줄</span>
    <button class="ctrl-btn" onclick="removeLastLine()">−</button>
    <span class="ctrl-value" id="line-count-ctrl">23</span>
    <button class="ctrl-btn" onclick="addLine()">＋</button>
  </div>

  <label class="upload-btn" for="file-input">
    📄 파일 올리기
    <input type="file" id="file-input" accept=".txt,.docx" onchange="handleFileUpload(event)">
  </label>

  <button class="upload-btn" onclick="clearAll()">🗑 전체 지우기</button>
</div>

<div class="default-sec-row">
  <span class="default-sec-label">기본 초수</span>
  <input type="number" class="default-sec-input" id="default-sec" value="3" min="1" max="30" oninput="updateTotalTime()">
  <button class="apply-all-btn" onclick="applyDefaultToAll()">전체 적용</button>
  <div class="total-time">총 <span id="total-time-val">69</span>초</div>
</div>

<div class="lines-container" id="lines-container"></div>

<div class="spell-section">
  <button class="spell-btn" id="spell-btn" onclick="checkSpelling()">
    <span>✦</span> 맞춤법 검토
  </button>
  <div class="spell-results" id="spell-results"></div>
</div>

<div class="bottom-bar">
  <button class="btn-secondary" onclick="previewSRT()">미리보기</button>
  <button class="btn-primary" onclick="downloadSRT()">SRT 다운로드</button>
</div>

<!-- API KEY MODAL -->
<div class="api-modal-overlay" id="api-modal-overlay">
  <div class="api-modal">
    <div class="api-modal-title">✦ ANTHROPIC API 키</div>
    <div class="api-modal-desc">
      맞춤법 교정 기능에 필요해요.<br>
      키는 브라우저에만 저장되고 외부로 전송되지 않아요.<br><br>
      키 발급 → <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </div>
    <input type="password" class="api-key-input" id="api-key-input" placeholder="sk-ant-..." />
    <div class="api-modal-btns">
      <button class="api-skip-btn" onclick="closeApiModal()">나중에</button>
      <button class="api-save-btn" onclick="saveApiKey()">저장하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let lines = [];
const DEFAULT_COUNT = 23;

function init() {
  for (let i = 0; i < DEFAULT_COUNT; i++) {
    lines.push({ text: '', sec: 3 });
  }
  renderLines();
  updateTotalTime();
  updateApiStatus();
  if (!apiKey) {
    setTimeout(() => openApiModal(), 500);
  } else {
    document.getElementById('api-modal-overlay').style.display = 'none';
  }
}

function renderLines() {
  const container = document.getElementById('lines-container');
  container.innerHTML = '';

  lines.forEach((line, i) => {
    const row = document.createElement('div');
    row.className = 'line-row' + (line.text.length > 20 ? ' warn-chars' : '');
    row.innerHTML = `
      <span class="line-num">${i + 1}</span>
      <textarea class="line-input" placeholder="자막 입력..." rows="1"
        oninput="onLineInput(${i}, this)"
        onkeydown="onLineKeydown(event, ${i})"
      >${line.text}</textarea>
      <span class="char-count ${line.text.length > 20 ? 'over' : ''}" id="char-${i}">${line.text.length}</span>
      <div class="sec-control">
        <button class="sec-btn" onclick="changeSec(${i}, -1)">−</button>
        <span class="sec-val" id="sec-${i}">${line.sec}s</span>
        <button class="sec-btn" onclick="changeSec(${i}, 1)">+</button>
      </div>
      <button class="line-del" onclick="deleteLine(${i})">×</button>
    `;
    container.appendChild(row);

    // auto resize textarea
    const ta = row.querySelector('textarea');
    autoResize(ta);
  });

  document.getElementById('line-count').textContent = lines.length;
  document.getElementById('line-count-ctrl').textContent = lines.length;
  updateTotalTime();
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function onLineInput(i, ta) {
  lines[i].text = ta.value;
  autoResize(ta);

  const charEl = document.getElementById(`char-${i}`);
  charEl.textContent = ta.value.length;

  const row = ta.closest('.line-row');
  if (ta.value.length > 20) {
    row.classList.add('warn-chars');
    charEl.classList.add('over');
  } else {
    row.classList.remove('warn-chars');
    charEl.classList.remove('over');
  }

  updateTotalTime();
}

function onLineKeydown(e, i) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    // focus next line
    const allInputs = document.querySelectorAll('.line-input');
    if (allInputs[i + 1]) allInputs[i + 1].focus();
    else addLine();
  }
}

function changeSec(i, delta) {
  lines[i].sec = Math.max(1, lines[i].sec + delta);
  document.getElementById(`sec-${i}`).textContent = lines[i].sec + 's';
  updateTotalTime();
}

function addLine() {
  const defSec = parseInt(document.getElementById('default-sec').value) || 3;
  lines.push({ text: '', sec: defSec });
  renderLines();
  // focus last
  setTimeout(() => {
    const inputs = document.querySelectorAll('.line-input');
    inputs[inputs.length - 1]?.focus();
    inputs[inputs.length - 1]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

function removeLastLine() {
  if (lines.length <= 1) return;
  lines.pop();
  renderLines();
}

function deleteLine(i) {
  if (lines.length <= 1) return;
  lines.splice(i, 1);
  renderLines();
}

function clearAll() {
  if (!confirm('전체 내용을 지울까요?')) return;
  lines = lines.map(l => ({ ...l, text: '' }));
  renderLines();
  document.getElementById('spell-results').classList.remove('show');
}

function applyDefaultToAll() {
  const defSec = parseInt(document.getElementById('default-sec').value) || 3;
  lines = lines.map(l => ({ ...l, sec: defSec }));
  renderLines();
  showToast(`전체 ${defSec}초 적용됨`);
}

function updateTotalTime() {
  const total = lines.reduce((sum, l) => sum + l.sec, 0);
  document.getElementById('total-time-val').textContent = total;
  document.getElementById('total-sec-header').textContent = total;
}

// FILE UPLOAD
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  if (file.name.endsWith('.txt')) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result;
      loadTextIntoLines(text);
    };
    reader.readAsText(file, 'UTF-8');
  } else if (file.name.endsWith('.docx')) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        // Use mammoth via CDN for docx parsing
        const arrayBuffer = e.target.result;
        const result = await mammoth.extractRawText({ arrayBuffer });
        loadTextIntoLines(result.value);
      } catch (err) {
        showToast('docx 파싱 실패. txt로 변환해서 올려주세요.');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  event.target.value = '';
}

function loadTextIntoLines(text) {
  const rawLines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const defSec = parseInt(document.getElementById('default-sec').value) || 3;
  lines = rawLines.map(t => ({ text: t, sec: defSec }));
  if (lines.length === 0) lines = [{ text: '', sec: defSec }];
  renderLines();
  showToast(`${lines.length}줄 불러옴`);
}

// API KEY
let apiKey = localStorage.getItem('anthropic_api_key') || '';

function openApiModal() {
  document.getElementById('api-key-input').value = apiKey;
  document.getElementById('api-modal-overlay').style.display = 'flex';
}

function closeApiModal() {
  document.getElementById('api-modal-overlay').style.display = 'none';
}

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) { showToast('키를 입력해줘요'); return; }
  apiKey = val;
  localStorage.setItem('anthropic_api_key', apiKey);
  updateApiStatus();
  closeApiModal();
  showToast('API 키 저장됨!');
}

function updateApiStatus() {
  const dot = document.getElementById('api-dot');
  const label = document.getElementById('api-label');
  if (apiKey) {
    dot.classList.add('active');
    label.textContent = 'API ✓';
    label.style.color = 'var(--success)';
  } else {
    dot.classList.remove('active');
    label.textContent = 'API 키';
    label.style.color = 'var(--text-dim)';
  }
}


async function checkSpelling() {
  if (!apiKey) { openApiModal(); return; }
  const btn = document.getElementById('spell-btn');
  const resultsEl = document.getElementById('spell-results');

  const texts = lines.map((l, i) => `${i + 1}. ${l.text}`).filter((_, i) => lines[i].text.trim());
  if (texts.length === 0) { showToast('입력된 자막이 없어요'); return; }

  btn.classList.add('loading');
  btn.innerHTML = '<span>⟳</span> 검토 중...';

  try {
    const prompt = `아래 자막 줄들의 맞춤법과 띄어쓰기를 교정해줘.
교정이 필요한 줄만 결과에 포함하고, 맞는 줄은 제외해.
반드시 JSON 배열 형식으로만 응답해. 다른 텍스트 없이.

형식: [{"line": 줄번호, "original": "원본", "corrected": "교정본"}]

자막:
${texts.join('\n')}`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content[0].text;
    const clean = raw.replace(/```json|```/g, '').trim();
    const corrections = JSON.parse(clean);

    resultsEl.innerHTML = '';
    if (corrections.length === 0) {
      resultsEl.innerHTML = '<div class="spell-ok">✓ 맞춤법 이상 없음</div>';
    } else {
      corrections.forEach(c => {
        const item = document.createElement('div');
        item.className = 'spell-item';
        item.innerHTML = `
          <span class="spell-num">${c.line}</span>
          <div class="spell-content">
            <div class="spell-original">${c.original}</div>
            <div class="spell-corrected">${c.corrected}</div>
          </div>
          <button class="spell-apply" onclick="applyCorrection(${c.line - 1}, '${c.corrected.replace(/'/g, "\\'")}')">적용</button>
        `;
        resultsEl.appendChild(item);
      });
    }
    resultsEl.classList.add('show');

  } catch (err) {
    showToast('교정 중 오류가 났어요');
  }

  btn.classList.remove('loading');
  btn.innerHTML = '<span>✦</span> 맞춤법 검토';
}

function applyCorrection(i, corrected) {
  lines[i].text = corrected;
  renderLines();
  showToast(`${i + 1}번 줄 적용됨`);
}

// SRT GENERATION
function generateSRT() {
  let srt = '';
  let currentTime = 0;

  lines.forEach((line, i) => {
    if (!line.text.trim()) return;
    const start = currentTime;
    const end = currentTime + line.sec;

    srt += `${i + 1}\n`;
    srt += `${formatTime(start)} --> ${formatTime(end)}\n`;
    srt += `${line.text}\n\n`;

    currentTime = end;
  });

  return srt;
}

function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  const ms = Math.round((sec - Math.floor(sec)) * 1000);
  return `${pad(h)}:${pad(m)}:${pad(s)},${padMs(ms)}`;
}

function pad(n) { return String(n).padStart(2, '0'); }
function padMs(n) { return String(n).padStart(3, '0'); }

function previewSRT() {
  const srt = generateSRT();
  if (!srt.trim()) { showToast('입력된 자막이 없어요'); return; }

  const modal = document.createElement('div');
  modal.style.cssText = `
    position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:999;
    display:flex; flex-direction:column; padding:16px;
  `;
  modal.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <span style="font-family:'JetBrains Mono',monospace; font-size:12px; color:#7f5cf0;">SRT 미리보기</span>
      <button onclick="this.closest('div[style]').remove()" style="
        background:transparent; border:1px solid #333; color:#999;
        border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer;
        font-family:'Noto Sans KR',sans-serif;
      ">닫기</button>
    </div>
    <pre style="
      flex:1; overflow-y:auto; font-family:'JetBrains Mono',monospace;
      font-size:11px; color:#ccc; line-height:1.8; white-space:pre-wrap;
      background:#111; border:1px solid #222; border-radius:8px; padding:12px;
    ">${srt}</pre>
  `;
  document.body.appendChild(modal);
}

function downloadSRT() {
  const srt = generateSRT();
  if (!srt.trim()) { showToast('입력된 자막이 없어요'); return; }

  const blob = new Blob([srt], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const date = new Date();
  const dateStr = `${date.getFullYear()}${pad(date.getMonth()+1)}${pad(date.getDate())}`;
  a.download = `subtitle_${dateStr}.srt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('SRT 다운로드 완료!');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}
